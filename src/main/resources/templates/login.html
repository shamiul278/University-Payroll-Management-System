<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPMS - Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f1f4f9 0%, #dbe3ee 100%);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between items-center py-8 font-sans antialiased text-slate-700">

<div class="text-center mt-4">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-900 rounded-xl text-white text-2xl shadow-md mb-3">
        <i class="fa-solid fa-building-columns"></i>
    </div>
    <h1 class="text-2xl font-bold tracking-wider text-blue-950">UPMS</h1>
    <p class="text-xs uppercase tracking-widest text-slate-400 font-medium mt-0.5">Academic Architect</p>
</div>

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 p-8 mx-4 my-auto relative">

    <h2 class="text-xl font-bold text-slate-800 mb-2">Secure Gateway</h2>

    <div class="flex items-center space-x-2 mb-6">
            <span class="inline-flex items-center bg-slate-100 text-slate-700 text-xs font-semibold px-2.5 py-1 rounded-md border border-slate-200">
                <i class="fa-solid fa-user-shield mr-1.5 text-slate-500"></i> Admin
            </span>
        <span class="text-slate-400 text-xs font-medium">&</span>
        <span class="inline-flex items-center bg-slate-100 text-slate-700 text-xs font-semibold px-2.5 py-1 rounded-md border border-slate-200">
                <i class="fa-solid fa-wallet mr-1.5 text-slate-500"></i> Accountant
            </span>
    </div>

    <form th:action="@{/login}" method="POST" class="space-y-5">

        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Username</label>
            <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <i class="fa-regular fa-user text-sm"></i>
                    </span>
                <input type="text"
                       name="username"
                       required
                       placeholder="Enter your institutional ID"
                       class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
            </div>
        </div>

        <div>
            <div class="flex justify-between items-center mb-2">
                <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Password</label>
                <a href="#" class="text-xs font-bold text-blue-700 uppercase tracking-wide hover:underline">Forgot?</a>
            </div>
            <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                <input type="password"
                       name="password"
                       required
                       placeholder="••••••••"
                       class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
            </div>
            <p class="text-[11px] text-slate-400 mt-2 flex items-center">
                <span class="w-1.5 h-1.5 bg-slate-300 rounded-full mr-1.5"></span>
                Use at least 8 characters with numbers.
            </p>
        </div>

        <div class="flex items-center pt-1">
            <input type="checkbox"
                   id="remember-me"
                   name="remember-me"
                   class="w-4 h-4 text-blue-900 border-slate-300 rounded focus:ring-blue-500">
            <label for="remember-me" class="ml-2 text-xs font-semibold text-slate-600 cursor-pointer select-none">
                Remember this session
            </label>
        </div>

        <div th:if="${param.error}" class="p-3 bg-red-50 border border-red-200 rounded-lg text-xs text-red-600 font-medium">
            <i class="fa-solid fa-triangle-exclamation mr-1.5"></i> Invalid Institutional ID or Password.
        </div>

        <button type="submit"
                class="w-full bg-blue-950 hover:bg-blue-900 text-white font-semibold text-sm py-3.5 px-4 rounded-lg shadow-md hover:shadow-lg transition-all flex items-center justify-center space-x-2 group">
            <span>Login to UPMS</span>
            <i class="fa-solid fa-arrow-right text-xs transform group-hover:translate-x-1 transition-transform"></i>
        </button>
    </form>

    <div class="grid grid-cols-3 gap-2 border-t border-slate-100 mt-8 pt-5 text-center text-[10px] font-bold tracking-wider text-slate-400 uppercase">
        <div class="flex flex-col items-center">
            <i class="fa-solid fa-shield-halved text-slate-300 text-base mb-1"></i>
            <span>Encryption</span>
        </div>
        <div class="flex flex-col items-center border-x border-slate-100">
            <i class="fa-solid fa-certificate text-slate-300 text-base mb-1"></i>
            <span>ISO 27001</span>
        </div>
        <div class="flex flex-col items-center">
            <i class="fa-solid fa-check-double text-slate-300 text-base mb-1"></i>
            <span>Compliance</span>
        </div>
    </div>
</div>

<div class="text-center w-full max-w-md px-4 mt-auto">
    <p class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">University Payroll Management System</p>
    <div class="flex justify-center space-x-3 mt-1.5 text-xs font-semibold text-slate-500">
        <a href="#" class="hover:text-blue-900 transition-colors">Support Center</a>
        <span class="text-slate-300">•</span>
        <a href="#" class="hover:text-blue-900 transition-colors">System Status</a>
    </div>
</div>

<div class="fixed bottom-6 right-6">
    <button class="w-10 h-10 bg-white hover:bg-slate-50 rounded-xl shadow-lg border border-slate-200 flex items-center justify-center text-slate-500 hover:text-slate-700 transition-all">
        <i class="fa-regular fa-circle-question text-lg"></i>
    </button>
</div>

</body>
</html>
